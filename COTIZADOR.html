<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Fotografía - Estilo Wedding Fino</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta personalizada */
  --ink: #1a202c;
  --paper: #f6f5f1;
  --gold: #d7d8cd;
  --gold-light: #e8e9df;
  --gold-pale: #ebede4;
  --muted: #6b7280;
  --line: #c5c6bd;
  --white: #ffffff;
  --sidebar: #d7d8cd;
  --sidebar-text: #1a202c;
  --red: #dc2626;
  --green: #d7d8cd;
  --green-dark: #b8b9b0;
  --contrast: #718096;
  --gold-accent: #d0ba8e;
  --beige-light: #f6f5f1;
  --beige-medium: #e8e7e3;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--beige-light);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOP NAV ── */
.topbar {
  background: var(--sidebar);
  border-bottom: 1px solid #c5c6bd;
  padding: 0 32px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 400;
  color: #1a202c;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.topbar-brand span { color: #1a202c; font-style: italic; font-weight: 300; }
.topbar-actions { display: flex; gap: 12px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 20px; border-radius: 40px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; border: none;
  transition: all .25s; letter-spacing: .5px;
}
.btn-ghost {
  background: transparent; color: #1a202c;
  border: 1px solid #c5c6bd;
}
.btn-ghost:hover { background: #d7d8cd; border-color: var(--contrast); color: #1a202c; }
.btn-gold {
  background: var(--contrast); color: #f6f5f1;
}
.btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-outline-red {
  background: transparent; color: #dc2626; border: 1px solid #c5c6bd;
}
.btn-outline-red:hover { background: #f0f0ec; border-color: #dc2626; }

/* ── MAIN LAYOUT ── */
.workspace {
  display: grid;
  grid-template-columns: 600px 1fr;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 62px);
}

/* ── LEFT PANEL ── */
.panel-left {
  background: var(--sidebar);
  overflow-y: auto;
  border-right: 1px solid #c5c6bd;
}
.panel-left::-webkit-scrollbar { width: 5px; }
.panel-left::-webkit-scrollbar-track { background: var(--sidebar); }
.panel-left::-webkit-scrollbar-thumb { background: #b8b9b0; border-radius: 10px; }

.section {
  border-bottom: 1px solid #c5c6bd;
}
.section-header {
  padding: 18px 24px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; user-select: none;
  transition: background .2s;
}
.section-header:hover { background: #d7d8cd; }
.section-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: #d7d8cd; border: 1px solid var(--contrast);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.section-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
  text-transform: uppercase; color: #1a202c;
  flex: 1;
}
.section-chevron {
  color: var(--muted); font-size: 12px;
  transition: transform .2s;
}
.section-chevron.open { transform: rotate(180deg); }
.section-body {
  padding: 0 24px 24px;
  display: none;
  animation: fadeDown .2s ease;
}
.section-body.open { display: block; }

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── FORM FIELDS ── */
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #6b7280; margin-bottom: 6px;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 14px;
  background: #e8e7e3; border: 1px solid #c5c6bd;
  border-radius: 12px; color: #1a202c;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  transition: all .2s;
  resize: vertical;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--contrast); box-shadow: 0 0 0 2px rgba(62, 63, 34, 0.15);
}
.field input::placeholder, .field textarea::placeholder { color: #6b7280; }
.field select option { background: #e8e7e3; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── LOGO UPLOAD (MÁS GRANDE) ── */
.logo-upload-area {
  background: #e8e7e3;
  border: 1px solid #c5c6bd;
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 20px;
}
.logo-preview {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.logo-img {
  max-width: 120px;
  max-height: 100px;
  object-fit: contain;
  background: var(--beige-light);
  padding: 6px;
  border-radius: 12px;
  border: 1px solid var(--contrast);
}
.logo-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn-small {
  padding: 6px 14px;
  font-size: 11px;
  border-radius: 30px;
}
.logo-note {
  font-size: 10px;
  color: #6b7280;
  margin-top: 10px;
}

/* ── SERVICES ── */
.service-category {
  margin-bottom: 14px;
  border: 1px solid #c5c6bd; border-radius: 16px; overflow: hidden;
}
.cat-header {
  padding: 12px 16px; background: #e8e7e3;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.cat-name {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: #1a202c;
  display: flex; align-items: center; gap: 10px;
}
.cat-icon { font-size: 16px; }
.cat-body { padding: 12px; display: none; background: #ebede4; }
.cat-body.open { display: block; }

.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.preset-btn {
  background: #e8e7e3; border: 1px solid #c5c6bd; border-radius: 12px;
  padding: 8px 12px; cursor: pointer; transition: all .2s;
  text-align: left;
}
.preset-btn:hover { border-color: var(--contrast); background: #d7d8cd; transform: translateY(-1px); }
.preset-name { font-size: 11px; color: #1a202c; font-weight: 500; display: block; }
.preset-price { font-size: 10px; color: var(--contrast); display: block; margin-top: 2px; }

/* ── ITEMS LIST ── */
.items-list { margin-bottom: 16px; }
.item-row {
  display: grid;
  grid-template-columns: 1fr 70px 90px 1fr 28px;
  gap: 8px; align-items: start; margin-bottom: 8px;
}
.item-row input, .item-row textarea {
  width: 100%; padding: 8px 10px;
  background: #e8e7e3; border: 1px solid #c5c6bd;
  border-radius: 10px; color: #1a202c;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
}
.item-row textarea { resize: vertical; min-height: 40px; }
.item-row input:focus, .item-row textarea:focus { outline: none; border-color: var(--contrast); }
.item-delete {
  background: transparent; border: none; color: #6b7280;
  cursor: pointer; font-size: 16px; padding: 6px;
  transition: color .2s; line-height: 1;
}
.item-delete:hover { color: var(--red); }
.item-col-headers {
  display: grid;
  grid-template-columns: 1fr 70px 90px 1fr 28px;
  gap: 8px; margin-bottom: 8px;
}
.item-col-headers span {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: #6b7280;
}
.add-item-btn {
  background: #e8e7e3; border: 1px solid #c5c6bd;
  border-radius: 12px; width: 100%; padding: 10px 14px;
  color: #1a202c; font-size: 13px; cursor: pointer;
  transition: all .2s; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.add-item-btn:hover { border-color: var(--contrast); background: #d7d8cd; transform: translateY(-1px); }

/* ── DISCOUNT / TAXES ── */
.calc-row { display: grid; grid-template-columns: 1fr 100px; gap: 12px; align-items: center; margin-bottom: 12px; }
.calc-label { font-size: 11px; color: #6b7280; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
.calc-row input {
  background: #e8e7e3;
  border: 1px solid #c5c6bd;
  border-radius: 12px;
  padding: 10px 14px;
  color: #1a202c;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
}
.calc-row input:hover {
  border-color: var(--contrast);
  background: #d7d8cd;
  transform: translateY(-1px);
}
.calc-row input:focus {
  outline: none;
  border-color: var(--contrast);
  box-shadow: 0 0 0 2px rgba(113, 128, 150, 0.15);
}

/* ── RIGHT PANEL ── */
.panel-right {
  background: var(--beige-light);
  overflow-y: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 24px;
}
.panel-right::-webkit-scrollbar { width: 6px; }
.panel-right::-webkit-scrollbar-track { background: var(--beige-medium); }
.panel-right::-webkit-scrollbar-thumb { background: var(--contrast); border-radius: 10px; }

/* ── QUOTE PREVIEW (ESTILO WEDDING) ── */
.quote-paper {
  background: var(--white);
  width: 100%; max-width: 900px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);
  padding: 0;
  font-family: 'DM Sans', sans-serif;
  position: relative;
  border-radius: 4px;
}

.quote-accent-bar {
  height: 6px;
  background: linear-gradient(90deg, var(--contrast) 0%, #5a5b35 50%, var(--contrast) 100%);
}

.quote-inner { padding: 52px 56px; }

/* Header con logo más grande */
.quote-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 48px;
  gap: 24px;
  flex-wrap: wrap;
}
.quote-head-left {
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
}
.quote-logo {
  max-height: 140px;
  max-width: 180px;
  object-fit: contain;
  border-radius: 8px;
}
.quote-brand {
  display: flex;
  flex-direction: column;
}
.quote-brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 600; color: var(--ink); letter-spacing: 1px;
  line-height: 1.1;
}
.quote-brand-tagline {
  font-size: 11px; color: var(--contrast); letter-spacing: 3px;
  text-transform: uppercase; margin-top: 6px; font-weight: 500;
}
.quote-brand-contact { font-size: 11px; color: var(--muted); margin-top: 14px; line-height: 1.7; }

.quote-meta { text-align: right; }
.quote-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px; font-weight: 300; letter-spacing: 8px;
  color: var(--contrast); text-transform: uppercase; line-height: 1;
}
.quote-number { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; margin-top: 8px; }
.quote-dates { margin-top: 12px; font-size: 11px; color: var(--muted); line-height: 1.9; }
.quote-dates strong { color: var(--ink); font-weight: 600; }

.quote-divider {
  height: 1px; background: var(--line); margin: 0 0 36px;
  position: relative;
}
.quote-divider::after {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: var(--white); padding: 0 12px;
  color: var(--gold); font-size: 12px;
}

.quote-client-block {
  display: grid; grid-template-columns: 1fr;
  gap: 20px; margin-bottom: 40px;
}
.quote-block-label {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--contrast); margin-bottom: 10px; font-weight: 600;
}
.quote-block-content { font-size: 13px; color: var(--ink); line-height: 1.8; }
.quote-block-content strong { font-weight: 600; font-size: 15px; display: block; margin-bottom: 4px; }

/* Tabla elegante */
.quote-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 32px;
  font-size: 13px;
}
.quote-table thead tr {
  background: var(--contrast);
}
.quote-table thead th {
  padding: 12px 14px;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #f6f5f1;
  font-weight: 600;
  text-align: left;
  border-bottom: none;
}
.quote-table thead th:nth-child(2),
.quote-table thead th:nth-child(3),
.quote-table thead th:nth-child(4) {
  text-align: right;
}
.quote-table tbody tr {
  border-bottom: 1px solid var(--line);
}
.quote-table tbody tr:hover {
  background: #fefaf5;
}
.quote-table tbody td {
  padding: 14px 12px;
  vertical-align: top;
  color: var(--ink);
}
.quote-table tbody td:first-child {
  font-weight: 500;
}
.quote-table tbody td:nth-child(2),
.quote-table tbody td:nth-child(3),
.quote-table tbody td:nth-child(4) {
  text-align: right;
}
.service-detail-text {
  display: block;
  font-size: 11px;
  color: var(--muted);
  font-weight: normal;
  margin-top: 6px;
  line-height: 1.4;
  font-style: italic;
  border-left: 2px solid var(--gold-pale);
  padding-left: 10px;
}

/* Totales */
.quote-totals {
  display: flex; justify-content: flex-end; margin-bottom: 40px;
}
.quote-totals-box { width: 280px; }
.totals-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.totals-row .lbl { color: var(--muted); }
.totals-row .val { color: var(--ink); font-weight: 500; }
.totals-grand {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; margin-top: 10px;
  background: var(--contrast); border-radius: 12px;
}
.totals-grand .lbl {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #d0ba8e;
}
.totals-grand .val {
  font-family: 'Cormorant Garamond', serif; font-size: 24px;
  font-weight: 600; color: #d0ba8e;
}

.quote-validity {
  background: var(--gold-pale); border-left: 4px solid var(--gold);
  padding: 14px 18px; margin-bottom: 36px;
  font-size: 12px; color: var(--muted); line-height: 1.6;
  border-radius: 8px;
}
.quote-validity strong { color: var(--ink); }

.quote-terms { margin-bottom: 40px; }
.quote-terms .quote-block-label { margin-bottom: 12px; }
.quote-terms p { font-size: 11px; color: var(--muted); line-height: 1.8; }

.quote-signature {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 36px; margin-top: 12px;
  padding-top: 28px; border-top: 1px solid var(--line);
}
.sig-box .sig-line {
  height: 1px; background: var(--line); margin-bottom: 8px;
}
.sig-box .sig-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

.quote-foot {
  margin-top: 44px; padding-top: 24px;
  border-top: 1px solid var(--gold-pale);
  display: flex; justify-content: space-between; align-items: center;
}
.quote-foot-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; color: var(--contrast); letter-spacing: 2px;
}
.quote-foot-note { font-size: 10px; color: var(--muted); }

/* ── PRINT ── */
@media print {
  body { background: white; }
  .topbar, .panel-left, .panel-right > *:not(.quote-paper) { display: none !important; }
  .workspace { display: block; height: auto; }
  .panel-right { background: white; padding: 0; display: block; overflow: visible; }
  .quote-paper { box-shadow: none; max-width: 100%; width: 100%; page-break-inside: avoid; }
  @page { margin: 12mm; size: A4; }
}

/* ── PDF EXPORT STYLES ── */
.pdf-export .quote-paper {
  box-shadow: none !important;
  max-width: 210mm !important;
  width: 210mm !important;
  margin: 0 auto !important;
}
.pdf-export .quote-inner {
  padding: 40px 35px !important;
}

.empty-table-msg {
  text-align: center; padding: 32px;
  font-size: 12px; color: #b0a896; font-style: italic;
}
.validity-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 12px; border-radius: 30px;
  font-size: 10px; font-weight: 600; letter-spacing: .5px;
}
.status-valid { background: #e0f0e0; color: var(--green-dark); }
.status-expired { background: #fae6e0; color: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">WED<span>Quote</span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="resetForm()">✕ Limpiar</button>
    <button class="btn btn-ghost" onclick="window.print()">⎙ Imprimir / PDF</button>
    <button class="btn btn-gold" onclick="exportToPDF()">⬇ Descargar PDF</button>
  </div>
</div>

<div class="workspace">
  <div class="panel-left">
    <!-- LOGO (más grande) -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-icon">🌿</div>
        <span class="section-title">Logotipo</span>
        <span class="section-chevron open">▾</span>
      </div>
      <div class="section-body open">
        <div class="logo-upload-area">
          <div class="field"><label>Subir logotipo (PNG, JPG)</label>
            <input type="file" id="logoUpload" accept="image/png,image/jpeg,image/jpg,image/webp">
          </div>
          <div class="logo-preview" id="logoPreviewArea"></div>
          <div class="logo-note">✨ Logotipo más grande para un estilo elegante.</div>
        </div>
      </div>
    </div>

    <!-- FOTÓGRAFO -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-icon">📸</div>
        <span class="section-title">Fotógrafo / Estudio</span>
        <span class="section-chevron open">▾</span>
      </div>
      <div class="section-body open">
        <div class="field"><label>Nombre / Estudio</label><input type="text" id="p_name" placeholder="Estudio Weddings" oninput="render()"></div>
        <div class="field"><label>Slogan</label><input type="text" id="p_tagline" placeholder="Fotografía de bodas & eventos" oninput="render()"></div>
        <div class="row-2"><div class="field"><label>Email</label><input type="text" id="p_email" placeholder="hola@weddings.com" oninput="render()"></div>
        <div class="field"><label>Teléfono</label><input type="text" id="p_phone" placeholder="+593 99 000 0000" oninput="render()"></div></div>
        <div class="field"><label>Ciudad</label><input type="text" id="p_city" placeholder="Quito, Ecuador" oninput="render()"></div>
      </div>
    </div>

    <!-- CLIENTE -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-icon">👰</div>
        <span class="section-title">Datos del Cliente</span>
        <span class="section-chevron open">▾</span>
      </div>
      <div class="section-body open">
        <div class="field"><label>Nombre completo</label><input type="text" id="c_name" placeholder="Cliente" oninput="render()"></div>
        <div class="row-2"><div class="field"><label>Email</label><input type="text" id="c_email" oninput="render()"></div>
        <div class="field"><label>Teléfono</label><input type="text" id="c_phone" oninput="render()"></div></div>
        <div class="field"><label>Notas adicionales</label><textarea id="c_notes" rows="2" placeholder="Información relevante..." oninput="render()"></textarea></div>
      </div>
    </div>

    <!-- META COTIZACIÓN -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-icon">🗂</div>
        <span class="section-title">Cotización</span>
        <span class="section-chevron open">▾</span>
      </div>
      <div class="section-body open">
        <div class="row-2"><div class="field"><label>N° Cotización</label><input type="text" id="q_number" oninput="render()"></div>
        <div class="field"><label>Fecha emisión</label><input type="date" id="q_date" oninput="render()"></div></div>
        <div class="row-2"><div class="field"><label>Válida hasta</label><input type="date" id="q_valid" oninput="render()"></div>
        <div class="field"><label>Moneda</label><select id="q_currency" onchange="render()"><option value="$">USD ($)</option><option value="S/.">SOL (S/.)</option><option value="€">EUR (€)</option></select></div></div>
      </div>
    </div>

    <!-- SERVICIOS -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-icon">💐</div>
        <span class="section-title">Servicios</span>
        <span class="section-chevron open">▾</span>
      </div>
      <div class="section-body open">
        <div class="service-category"><div class="cat-header" onclick="toggleCat(this)"><span class="cat-name"><span class="cat-icon">💍</span> Bodas / Eventos</span><span>▾</span></div>
        <div class="cat-body"><div class="preset-grid"><button class="preset-btn" onclick="addPreset('Boda completa (8h)','1','1200')"><span class="preset-name">Boda completa</span><span class="preset-price">$1,200</span></button><button class="preset-btn" onclick="addPreset('Media jornada (4h)','1','680')"><span class="preset-name">Media jornada</span><span class="preset-price">$680</span></button><button class="preset-btn" onclick="addPreset('Sesión novios (2h)','1','320')"><span class="preset-name">Sesión novios</span><span class="preset-price">$320</span></button></div></div></div>
        <div class="service-category"><div class="cat-header" onclick="toggleCat(this)"><span class="cat-name"><span class="cat-icon">🖼</span> Retratos</span><span>▾</span></div>
        <div class="cat-body"><div class="preset-grid"><button class="preset-btn" onclick="addPreset('Retrato individual','1','180')"><span class="preset-name">Individual</span><span class="preset-price">$180</span></button><button class="preset-btn" onclick="addPreset('Sesión familiar','1','250')"><span class="preset-name">Familiar</span><span class="preset-price">$250</span></button></div></div></div>
        <div style="margin-top:16px;"><div class="item-col-headers"><span>Descripción</span><span>Cant.</span><span>Precio</span><span>Detalle</span><span></span></div><div class="items-list" id="items-container"></div><button class="add-item-btn" onclick="addCustomItem()">+ Agregar ítem manual</button></div>
      </div>
    </div>

    <!-- DESCUENTOS -->
    <div class="section"><div class="section-header" onclick="toggleSection(this)"><div class="section-icon">💰</div><span class="section-title">Descuentos e Impuestos</span><span class="section-chevron open">▾</span></div>
    <div class="section-body open"><div class="calc-row"><span class="calc-label">Descuento (%)</span><input type="number" id="t_discount" value="0" min="0" max="100" oninput="render()"></div>
    <div class="calc-row"><span class="calc-label">IVA (%)</span><input type="number" id="t_tax" value="0" min="0" max="100" oninput="render()"></div>
    <div class="calc-row"><span class="calc-label">Anticipo (%)</span><input type="number" id="t_advance" value="50" min="0" max="100" oninput="render()"></div></div></div>

    <!-- TERMINOS -->
    <div class="section"><div class="section-header" onclick="toggleSection(this)"><div class="section-icon">📜</div><span class="section-title">Terminos y condiciones</span><span class="section-chevron">▾</span></div>
    <div class="section-body"><div class="field"><textarea id="t_terms" rows="6" oninput="render()">1. Anticipo del 50% para reservar fecha.\n2. Saldo restante antes del evento.\n3. Entrega digital en 15 días hábiles.\n4. Derechos de autor del fotógrafo.</textarea></div></div></div>
  </div>

  <div class="panel-right">
    <div class="quote-paper" id="quote-preview"><div class="quote-accent-bar"></div><div class="quote-inner"></div></div>
  </div>
</div>
<script>
let items = [], itemId = 0, logoDataURL = null;
function saveLogo() { if(logoDataURL) localStorage.setItem('studio_logo_wed', logoDataURL); else localStorage.removeItem('studio_logo_wed'); }
function loadLogo() { const saved = localStorage.getItem('studio_logo_wed'); if(saved && saved.startsWith('data:image')){ logoDataURL=saved; updateLogoPreview(); render(); } }
function updateLogoPreview(){ const area=document.getElementById('logoPreviewArea'); if(!area)return; if(logoDataURL) area.innerHTML=`<img src="${logoDataURL}" class="logo-img"><div class="logo-actions"><button class="btn btn-small btn-outline-red" onclick="clearLogo()">🗑️ Eliminar</button></div>`; else area.innerHTML='<span style="color:var(--beige-medium);font-size:12px;">🖼️ Sube tu logotipo</span>'; }
function handleLogoUpload(f){ if(!f)return; const r=new FileReader(); r.onload=e=>{ logoDataURL=e.target.result; saveLogo(); updateLogoPreview(); render(); }; r.readAsDataURL(f); }
function clearLogo(){ logoDataURL=null; saveLogo(); updateLogoPreview(); render(); document.getElementById('logoUpload').value=''; }
window.onload=()=>{ const today=new Date(); const fmt=d=>d.toISOString().split('T')[0]; const vd=new Date(today); vd.setDate(today.getDate()+15); document.getElementById('q_date').value=fmt(today); document.getElementById('q_valid').value=fmt(vd); document.getElementById('q_number').value='COT-'+String(today.getFullYear()).slice(2)+String(today.getMonth()+1).padStart(2,'0')+'-'+Math.floor(Math.random()*900+100); document.getElementById('logoUpload').addEventListener('change',e=>{if(e.target.files[0])handleLogoUpload(e.target.files[0]);}); loadLogo(); render(); };
function toggleSection(h){ const b=h.nextElementSibling; const c=h.querySelector('.section-chevron'); b.classList.toggle('open'); c.classList.toggle('open'); }
function toggleCat(h){ h.nextElementSibling.classList.toggle('open'); }
function addPreset(d,q,p){ items.push({id:++itemId,desc:d,qty:parseFloat(q),price:parseFloat(p),detail:[]}); renderItemsList(); render(); }
function addCustomItem(){ items.push({id:++itemId,desc:'',qty:1,price:0,detail:[]}); renderItemsList(); }
function removeItem(id){ items=items.filter(i=>i.id!==id); renderItemsList(); render(); }
function updateItem(id,f,v){ const i=items.find(i=>i.id===id); if(i) i[f]= (f==='desc'||f==='detail')? v : (parseFloat(v)||0); render(); }
function renderItemsList(){
  const c=document.getElementById('items-container');
  if(!c)return;
  c.innerHTML='';

  items.forEach(i=>{
    const r=document.createElement('div');
    r.className='item-row';

    r.innerHTML=`
      <input type="text" value="${escapeHtml(i.desc)}"
        oninput="updateItem(${i.id},'desc',this.value)">

      <input type="number" value="${i.qty}" min="1"
        oninput="updateItem(${i.id},'qty',this.value)">

      <input type="number" value="${i.price}" step="0.01"
        oninput="updateItem(${i.id},'price',this.value)">

      <div class="details-box">
        ${(i.detail||[]).map((d,idx)=>`
          <div class="detail-row">
            <input type="text" value="${escapeHtml(d)}"
              oninput="updateDetail(${i.id},${idx},this.value)">
            <button class="btn btn-outline-red btn-small"
  onclick="removeDetail(${i.id},${idx})">
  ✕
</button>
          </div>
        `).join('')}

        <button class="btn btn-ghost"
  onclick="addDetail(${i.id})">
  Añadir
</button>
      </div>

      <button class="item-delete"
        onclick="removeItem(${i.id})">✕</button>
    `;

    c.appendChild(r);
  });
}
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function v(id){ return document.getElementById(id)?.value||''; }
function n(id){ return parseFloat(document.getElementById(id)?.value)||0; }
function fmtDate(ds){ if(!ds)return '—'; const [y,m,d]=ds.split('-'); const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']; return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`; }
function fmtMoney(a,c='$'){ return `${c} ${a.toLocaleString('es-EC',{minimumFractionDigits:2})}`; }
function render(){
  const cur=v('q_currency')||'$'; const dsc=n('t_discount'); const tax=n('t_tax'); const adv=n('t_advance');
  const subtotal=items.reduce((s,i)=>s+(i.qty*i.price),0);
  const dscAmt=subtotal*(dsc/100); const after=subtotal-dscAmt; const taxAmt=after*(tax/100); const total=after+taxAmt; const advAmt=total*(adv/100);
  let rows=''; if(items.length===0) rows=`<tr><td colspan="5" class="empty-table-msg">✨ Agrega servicios desde el panel izquierdo</td></tr>`;
  else items.forEach(i=>{ if(i.desc){ const sub=i.qty*i.price; const detHtml = (i.detail && i.detail.length)
  ? `<div style="margin-top:6px;">
      ${i.detail.map(d => `
        <div class="service-detail-text">• ${escapeHtml(d)}</div>
      `).join('')}
    </div>`
  : ''; rows+=`<tr><td>${escapeHtml(i.desc)}${detHtml}</td><td>${i.qty}</td><td>${fmtMoney(i.price,cur)}</td><td>${fmtMoney(sub,cur)}</td></tr>`; } });
  const valid=v('q_valid'); const expired=valid?new Date(valid+'T23:59:59')<new Date():false; const badge=expired?'status-expired':'status-valid'; const badgeText=expired?'⚠ Vencida':'✓ Vigente';
  let totals=`<div class="totals-row"><span class="lbl">Subtotal</span><span class="val">${fmtMoney(subtotal,cur)}</span></div>`;
  if(dsc>0) totals+=`<div class="totals-row"><span class="lbl">Descuento (${dsc}%)</span><span class="val" style="color:var(--green)">− ${fmtMoney(dscAmt,cur)}</span></div>`;
  if(tax>0) totals+=`<div class="totals-row"><span class="lbl">IVA (${tax}%)</span><span class="val">${fmtMoney(taxAmt,cur)}</span></div>`;
  const notes=v('c_notes')?`<p style="margin-top:8px;font-size:12px;color:var(--muted);font-style:italic;">📌 ${escapeHtml(v('c_notes'))}</p>`:'';
  const payNote=adv>0?`<p style="margin-top:10px;font-size:11px;"><strong>Anticipo (${adv}%):</strong> ${fmtMoney(advAmt,cur)} para reservar.</p>`:'';
  const terms=v('t_terms').split('\n').map(l=>`<p>${escapeHtml(l)}</p>`).join('');
  const logoHtml=logoDataURL?`<img src="${logoDataURL}" class="quote-logo" alt="Logo">`:'';
  const html=`
    <div class="quote-head"><div class="quote-head-left">${logoHtml}<div class="quote-brand"><div class="quote-brand-name">${escapeHtml(v('p_name'))||'Estudio Weddings'}</div><div class="quote-brand-tagline">${escapeHtml(v('p_tagline'))||'Fotografía de ensueño'}</div><div class="quote-brand-contact">${v('p_email')?`✉ ${escapeHtml(v('p_email'))}<br>`:''}${v('p_phone')?`📞 ${escapeHtml(v('p_phone'))}<br>`:''}${v('p_city')?`📍 ${escapeHtml(v('p_city'))}`:''}</div></div></div><div class="quote-meta"><div class="quote-label">Proforma</div><div class="quote-number"># ${escapeHtml(v('q_number'))||'—'}</div><div class="quote-dates"><strong>Fecha:</strong> ${fmtDate(v('q_date'))}<br><strong>Válida:</strong> ${fmtDate(v('q_valid'))}${valid?`<br><span class="validity-status ${badge}">${badgeText}</span>`:''}</div></div></div>
    <div class="quote-divider"></div>
    <div class="quote-client-block"><div><div class="quote-block-label">Preparado para</div><div class="quote-block-content"><strong>${escapeHtml(v('c_name'))||'Cliente'}</strong>${v('c_email')?`<br>${escapeHtml(v('c_email'))}`:''}${v('c_phone')?`<br>${escapeHtml(v('c_phone'))}`:''}</div>${notes}</div></div>
    <table class="quote-table"><thead><tr><th>Servicio</th><th>Cant.</th><th>Precio</th><th>Subtotal</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="quote-totals"><div class="quote-totals-box">${totals}<div class="totals-grand"><span class="lbl">TOTAL</span><span class="val">${fmtMoney(total,cur)}</span></div>${payNote}</div></div>
    ${valid?`<div class="quote-validity"><strong>⏳ Validez:</strong> Oferta válida hasta ${fmtDate(valid)}. Precios sujetos a cambio.</div>`:''}
    ${terms?`<div class="quote-terms"><div class="quote-block-label">Términos</div>${terms}</div>`:''}
    <div class="quote-signature"><div class="sig-box"><div class="sig-line"></div><div class="sig-label">Firma Fotógrafo — ${escapeHtml(v('p_name'))||'Fotógrafo'}</div></div><div class="sig-box"><div class="sig-line"></div><div class="sig-label">Firma Cliente — ${escapeHtml(v('c_name'))||'Cliente'}</div></div></div>
    <div class="quote-foot"><div class="quote-foot-brand">${escapeHtml(v('p_name'))||'ESTUDIO'}</div><div class="quote-foot-note">${escapeHtml(v('p_email'))} ${v('p_phone')?'· '+escapeHtml(v('p_phone')):''}</div></div>
  `;
  document.querySelector('#quote-preview .quote-inner').innerHTML=html;
}
function resetForm(){ if(confirm('¿Limpiar todo?')){ ['p_name','p_tagline','p_email','p_phone','p_city','c_name','c_email','c_phone','c_notes'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';}); document.getElementById('t_discount').value=0; document.getElementById('t_tax').value=0; document.getElementById('t_advance').value=50; document.getElementById('t_terms').value='1. Anticipo del 50% para reservar fecha.\n2. Saldo restante antes del evento.\n3. Entrega digital en 15 días hábiles.\n4. Derechos de autor del fotógrafo.'; items=[]; renderItemsList(); const today=new Date(); const fmt=d=>d.toISOString().split('T')[0]; const vd=new Date(today); vd.setDate(today.getDate()+15); document.getElementById('q_date').value=fmt(today); document.getElementById('q_valid').value=fmt(vd); document.getElementById('q_number').value='COT-'+String(today.getFullYear()).slice(2)+String(today.getMonth()+1).padStart(2,'0')+'-'+Math.floor(Math.random()*900+100); render(); } }
function copyQuoteHTML(){ const paper=document.getElementById('quote-preview'); const styles=document.querySelector('style').textContent; const blob=new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>${styles}</style></head><body style="background:#f5efe6;display:flex;justify-content:center;padding:40px 20px;">${paper.outerHTML}</body></html>`],{type:'text/html'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Cotizacion_${v('q_number')||'Wedding'}.html`; a.click(); URL.revokeObjectURL(blob); }

function exportToPDF() {
  const qNum = v('q_number') || 'Cotizacion';

  // 1. Clonar el quote-paper completo (incluye accent-bar + inner)
  const original = document.getElementById('quote-preview');
  const clone = original.cloneNode(true);

  // 2. Aplicar estilos computados inline a CADA elemento del clon
  //    → resuelve vars CSS, elimina dependencias externas
  const origEls = [original, ...original.querySelectorAll('*')];
  const cloneEls = [clone,   ...clone.querySelectorAll('*')];

  const PROPS = [
    'display','position','top','left','right','bottom','zIndex',
    'width','minWidth','maxWidth','height','minHeight','maxHeight',
    'margin','marginTop','marginRight','marginBottom','marginLeft',
    'padding','paddingTop','paddingRight','paddingBottom','paddingLeft',
    'fontFamily','fontSize','fontWeight','fontStyle','fontVariant',
    'lineHeight','letterSpacing','textTransform','textAlign','textDecoration',
    'color','backgroundColor','background','backgroundImage',
    'border','borderTop','borderRight','borderBottom','borderLeft',
    'borderColor','borderWidth','borderStyle','borderRadius',
    'boxShadow','opacity','overflow','overflowX','overflowY',
    'flex','flexDirection','flexWrap','alignItems','justifyContent','gap',
    'gridTemplateColumns','gridColumn','gridRow',
    'verticalAlign','whiteSpace','wordBreak',
    'pageBreakInside','breakInside',
  ];

  origEls.forEach((origEl, i) => {
    const cs = window.getComputedStyle(origEl);
    PROPS.forEach(p => {
      try { cloneEls[i].style[p] = cs[p]; } catch(e) {}
    });
    // quitar box-shadow para el papel impreso
    if (cloneEls[i].classList.contains('quote-paper')) {
      cloneEls[i].style.boxShadow = 'none';
      cloneEls[i].style.borderRadius = '0';
      cloneEls[i].style.width = '100%';
      cloneEls[i].style.maxWidth = '100%';
    }
  });

  // 3. Serializar el HTML del clon
  const cloneHTML = clone.outerHTML;

  // 4. Construir el documento de impresión
  const googleFonts = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap';

  const printHTML = `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>${qNum}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="${googleFonts}" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    html, body {
      margin: 0; padding: 16px;
      background: #f0ede8;
      font-family: 'DM Sans', sans-serif;
    }
    @page {
      size: A4 portrait;
      margin: 8mm 10mm;
    }
    @media print {
      html, body { background: #ffffff !important; padding: 0 !important; }
    }
  </style>
</head>
<body>
  ${cloneHTML}
  <script>
    document.fonts.ready.then(function() {
      setTimeout(function() { window.print(); }, 500);
    });
  <\/script>
</body>
</html>`;

  // 5. Abrir ventana y escribir
  const pw = window.open('', '_blank', 'width=860,height=780');
  if (!pw) {
    alert('Permite las ventanas emergentes en tu navegador para exportar el PDF.');
    return;
  }
  pw.document.open();
  pw.document.write(printHTML);
  pw.document.close();
}
function addDetail(id){
  const item = items.find(i => i.id === id);
  if(item){
    if(!item.detail) item.detail=[];
    item.detail.push('');
    renderItemsList();
  }
}

function updateDetail(id,index,value){
  const item = items.find(i => i.id === id);
  if(item && item.detail){
    item.detail[index]=value;
    render();
  }
}

function removeDetail(id,index){
  const item = items.find(i => i.id === id);
  if(item && item.detail){
    item.detail.splice(index,1);
    renderItemsList();
    render();
  }
}
</script>

</body>
</html>
